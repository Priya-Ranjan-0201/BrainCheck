name: CI — Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # 3. Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. Run tests
      - name: Run pytest
        run: pytest tests/ -v

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      # 1. Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Build Docker image
      - name: Build Docker image
        run: docker build -t braincheck:test .

      # 3. Verify container starts
      - name: Start container and verify
        run: |
          docker run -d --name braincheck-test -p 5000:5000 braincheck:test
          sleep 5
          curl --fail http://localhost:5000/health || exit 1
          docker stop braincheck-test
          docker rm braincheck-test
